<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的技能简介</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }
        body {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
            line-height: 1.6;
        }
        .card {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        h1 {
            color: #2c3e50;
            margin-bottom: 15px;
        }
        h2 {
            color: #34495e;
            margin: 20px 0 10px;
            border-left: 4px solid #3498db;
            padding-left: 10px;
        }
        .skill {
            display: inline-block;
            background: #3498db;
            color: white;
            padding: 5px 12px;
            border-radius: 15px;
            margin: 5px;
        }
        a {
            color: #3498db;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
        .file-section {
            margin-top: 30px;
        }
        #fileInput {
            margin: 10px 0;
        }
        #preview {
            background: white;
            padding: 15px;
            border-radius: 5px;
            min-height: 100px;
            white-space: pre-wrap;
            border: 1px solid #ddd;
        }
        .download-btn {
            background: #2ecc71;
            color: white;
            padding: 6px 12px;
            border-radius: 5px;
            border: none;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>你好，我是 XXX</h1>
        <p>热爱编程、持续学习、专注实践</p>
    </div>

    <div class="card">
        <h2>📌 个人简介</h2>
        <p>一名前端 / 后端 / 全栈开发者（可自己修改），喜欢用代码解决实际问题，擅长快速学习新技术并落地。</p>
    </div>

    <div class="card">
        <h2>🛠 技能栈</h2>
        <div class="skill">HTML</div>
        <div class="skill">CSS</div>
        <div class="skill">JavaScript</div>
        <div class="skill">Git</div>
        <div class="skill">GitHub</div>
        <div class="skill">Python</div>
        <!-- 自己增删 -->
    </div>

    <div class="card">
        <h2>📞 联系方式</h2>
        <p>GitHub：<a href="https://github.com/你的用户名" target="_blank">https://github.com/你的用户名</a></p>
        <p>邮箱：your@email.com</p>
    </div>

    <!-- ====================== TXT 文件功能 ====================== -->
    <div class="card file-section">
        <h2>📄 TXT 文件管理</h2>
        
        <h3>✅ 我的文件（可直接下载）</h3>
        <p><a href="files/简历.txt" download>简历.txt</a></p>
        <p><a href="files/学习笔记.txt" download>学习笔记.txt</a></p>
        <p><a href="files/项目说明.txt" download>项目说明.txt</a></p>

        <hr style="margin:20px 0">

        <h3>⬆️ 本地上传 TXT 文件（预览+下载）</h3>
        <input type="file" id="fileInput" accept=".txt">
        <div id="preview">请选择一个 TXT 文件...</div>
        <button id="downloadBtn" class="download-btn" style="display:none;">下载此文件</button>
    </div>

    <script>
        // 本地 TXT 上传预览
        const fileInput = document.getElementById('fileInput');
        const preview = document.getElementById('preview');
        const downloadBtn = document.getElementById('downloadBtn');
        let currentFile;

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            currentFile = file;
            const reader = new FileReader();
            reader.onload = (event) => {
                preview.textContent = event.target.result;
                downloadBtn.style.display = 'inline-block';
            };
            reader.readAsText(file);
        });

        // 下载本地预览的文件
        downloadBtn.addEventListener('click', () => {
            if (!currentFile) return;
            const url = URL.createObjectURL(currentFile);
            const a = document.createElement('a');
            a.href = url;
            a.download = currentFile.name;
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>
</html>
